<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128" viewBox="110 15 35 190">

  <!-- Fond transparent -->
  <rect width="100%" height="100%" fill="none"/>

  <defs>
    <!-- Ombre portée pour l'hexagone -->
    <filter id="hexShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4"
                    flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Dégradé principal de l'hexagone -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffe9a3"/>
      <stop offset="45%"  stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff9f00"/>
    </linearGradient>

    <!-- Reflet en haut de l'hexagone -->
    <linearGradient id="hexHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- GROUPE HEXAGONE AVEC OMBRE -->
  <g filter="url(#hexShadow)">
    <!-- contour -->
    <polygon
      points="128,20 198,65 198,155 128,200 58,155 58,65"
      fill="#ffb300"
      stroke="#e09100"
      stroke-width="3"/>

    <!-- intérieur -->
    <polygon
      points="128,35 183,75 183,145 128,185 73,145 73,75"
      fill="url(#hexGradient)"/>

    <!-- reflet en haut (aspect brillant) -->
    <path
      d="M73,75
         L183,75
         L168,85
         L88,85 Z"
      fill="url(#hexHighlight)"
      opacity="0.65"/>

    <!-- losange jaune au-dessus de la double hélice -->
    <rect x="121" y="55" width="14" height="14"
          fill="#ffc107"
          stroke="#ff9800"
          stroke-width="2"
          transform="rotate(45 128 62)"/>

    <!-- DOUBLE HÉLICE SIMPLIFIÉE -->

    <!-- ombre douce sous la branche gauche -->
    <path d="M108 85
             C 93 90 113 98 128 105
             C 148 115 158 130 128 135
             C 98 140 93 150 108 155"
          fill="none"
          stroke="#161616"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.25"/>

    <!-- ombre douce sous la branche droite -->
    <path d="M148 85
             C 163 90 143 98 128 105
             C 108 115 98 130 128 135
             C 158 140 163 150 148 155"
          fill="none"
          stroke="#161616"
          stroke-width="10"
          stroke-linecap="round"
          opacity="0.25"/>

    <!-- branche gauche principale -->
    <path d="M108 85
             C 93 90 113 98 128 105
             C 148 115 158 130 128 135
             C 98 140 93 150 108 155"
          fill="none"
          stroke="#2c2c2c"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- branche droite principale -->
    <path d="M148 85
             C 163 90 143 98 128 105
             C 108 115 98 130 128 135
             C 158 140 163 150 148 155"
          fill="none"
          stroke="#2c2c2c"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- highlights blancs sur les spirales -->
    <path d="M110 88
             C 96 93 116 100 129 107
             C 147 116 155 128 127 133
             C 101 137 96 148 109 153"
          fill="none"
          stroke="#ffffff"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0.35"/>

    <path d="M146 88
             C 160 93 140 100 127 107
             C 109 116 101 128 129 133
             C 155 137 160 148 147 153"
          fill="none"
          stroke="#ffffff"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0.35"/>

    <!-- 4 ronds aux extrémités -->
    <circle cx="108" cy="85" r="9" fill="#ffc107" stroke="#2c2c2c" stroke-width="3"/>
    <circle cx="148" cy="85" r="9" fill="#ffc107" stroke="#2c2c2c" stroke-width="3"/>
    <circle cx="108" cy="155" r="9" fill="#ffc107" stroke="#2c2c2c" stroke-width="3"/>
    <circle cx="148" cy="155" r="9" fill="#ffc107" stroke="#2c2c2c" stroke-width="3"/>

    <!-- petit rond central -->
    <circle cx="128" cy="120" r="7"
            fill="#ffecb3"
            stroke="#2c2c2c"
            stroke-width="3"/>
  </g>
</svg>
