<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  
  <!-- Grid lines (square maximized) -->
  <g stroke="#404040" stroke-width="0.5" opacity="0.8">
    <!-- Vertical grid lines -->
    <line x1="16" y1="2" x2="16" y2="62"/>
    <line x1="32" y1="2" x2="32" y2="62"/>
    <line x1="48" y1="2" x2="48" y2="62"/>
    
    <!-- Horizontal grid lines -->
    <line x1="2" y1="16" x2="62" y2="16"/>
    <line x1="2" y1="32" x2="62" y2="32"/>
    <line x1="2" y1="48" x2="62" y2="48"/>
  </g>
  
  <!-- Origin axes (square maximized) -->
  <g>
    <!-- X axis (red) -->
    <line x1="0" y1="32" x2="64" y2="32" stroke="#ff4444" stroke-width="1.2"/>
    <!-- Y axis (green) -->
    <line x1="32" y1="0" x2="32" y2="64" stroke="#44ff44" stroke-width="1.2"/>
  </g>
  
  <!-- Origin marker (square maximized) -->
  <circle cx="32" cy="32" r="3" fill="#ef4444" stroke="#ffffff" stroke-width="1.5"/>
  
  <!-- 8 directional overlays (square maximized flower) -->
  <!-- Up -->
  <circle cx="32" cy="10" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Down -->
  <circle cx="32" cy="54" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Left -->
  <circle cx="10" cy="32" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Right -->
  <circle cx="54" cy="32" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Up-Left -->
  <circle cx="16" cy="16" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Up-Right -->
  <circle cx="48" cy="16" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Down-Left -->
  <circle cx="16" cy="48" r="3" fill="#ffc107" fill-opacity="0.7"/>
  <!-- Down-Right -->
  <circle cx="48" cy="48" r="3" fill="#ffc107" fill-opacity="0.7"/>
  
  <!-- Current position crosshair (square maximized) -->
  <g stroke="#4f9eff" stroke-width="1.5">
    <line x1="22" y1="32" x2="42" y2="32"/>
    <line x1="32" y1="22" x2="32" y2="42"/>
  </g>
</svg>