<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 64">

  
  <!-- Grid lines (mini) -->
  <g stroke="#404040" stroke-width="0.3" opacity="0.8">
    <!-- Vertical grid lines -->
    <line x1="16" y1="16" x2="16" y2="48"/>
    <line x1="24" y1="16" x2="24" y2="48"/>
    <line x1="32" y1="16" x2="32" y2="48"/>
    
    <!-- Horizontal grid lines -->
    <line x1="8" y1="24" x2="40" y2="24"/>
    <line x1="8" y1="32" x2="40" y2="32"/>
    <line x1="8" y1="40" x2="40" y2="40"/>
  </g>
  
  <!-- Origin axes (mini) -->
  <g>
    <!-- X axis (red) -->
    <line x1="4" y1="32" x2="44" y2="32" stroke="#ff4444" stroke-width="0.8"/>
    <!-- Y axis (green) -->
    <line x1="24" y1="12" x2="24" y2="52" stroke="#44ff44" stroke-width="0.8"/>
  </g>
  
  <!-- Origin marker (mini) -->
  <circle cx="24" cy="32" r="2" fill="#ef4444" stroke="#ffffff" stroke-width="1"/>
  
  <!-- 8 directional overlays (mini flower) -->
  <!-- Up -->
  <circle cx="24" cy="20" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Down -->
  <circle cx="24" cy="44" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Left -->
  <circle cx="12" cy="32" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Right -->
  <circle cx="36" cy="32" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Up-Left -->
  <circle cx="16" cy="24" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Up-Right -->
  <circle cx="32" cy="24" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Down-Left -->
  <circle cx="16" cy="40" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  <!-- Down-Right -->
  <circle cx="32" cy="40" r="1.5" fill="#ffc107" fill-opacity="0.6"/>
  
  <!-- Current position crosshair (mini) -->
  <g stroke="#4f9eff" stroke-width="1">
    <line x1="20" y1="32" x2="28" y2="32"/>
    <line x1="24" y1="28" x2="24" y2="36"/>
  </g>
  
  <!-- EnderTrack text -->
  <text x="60" y="40" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="2px" fill="#ffc107">EnderTrack</text>
</svg>