        <!-- Mapping Modal -->
        <div id="mappingModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 700px;">
                <div class="modal-header">
                    <h3>🗺️ Configuration Mapping</h3>
                    <button class="modal-close" onclick="window.ExternalController.closeMappingModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- Onglets de navigation -->
                    <div class="display-tabs">
                        <button class="display-tab active" onclick="window.ExternalController.switchMappingTab('navigation')">Navigation</button>
                        <button class="display-tab" onclick="window.ExternalController.switchMappingTab('functions')">Fonctions</button>
                        <button class="display-tab" onclick="window.ExternalController.switchMappingTab('presets')">Presets</button>
                    </div>
                    
                    <!-- Onglet Navigation -->
                    <div class="display-tab-content active" id="navigationMappingTab">
                        <div class="setting-group">
                            <label>Contrôles Directionnels</label>
                            <div style="display: flex; gap: 24px; align-items: flex-start; justify-content: center;">
                                <!-- Croix directionnelle -->
                                <div class="arrow-pad" style="position: relative;">
                                    <div class="arrow-row">
                                        <div></div>
                                        <div style="text-align: center;">
                                            <button id="mapUp" onclick="window.ExternalController.startMapping('up')" class="arrow-btn">▲</button>
                                            <div id="mapUpValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                        </div>
                                        <div></div>
                                    </div>
                                    <div class="arrow-row">
                                        <div style="text-align: center;">
                                            <button id="mapLeft" onclick="window.ExternalController.startMapping('left')" class="arrow-btn">◄</button>
                                            <div id="mapLeftValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                        </div>
                                        <div class="arrow-center">XY</div>
                                        <div style="text-align: center;">
                                            <button id="mapRight" onclick="window.ExternalController.startMapping('right')" class="arrow-btn">►</button>
                                            <div id="mapRightValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                        </div>
                                    </div>
                                    <div class="arrow-row">
                                        <div></div>
                                        <div style="text-align: center;">
                                            <button id="mapDown" onclick="window.ExternalController.startMapping('down')" class="arrow-btn">▼</button>
                                            <div id="mapDownValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                        </div>
                                        <div></div>
                                    </div>
                                </div>
                                
                                <!-- Contrôles Z -->
                                <div class="z-controls-right">
                                    <div style="text-align: center;">
                                        <button id="mapZUp" onclick="window.ExternalController.startMapping('zUp')" class="z-btn">▲</button>
                                        <div id="mapZUpValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                    </div>
                                    <div class="z-center">Z</div>
                                    <div style="text-align: center;">
                                        <button id="mapZDown" onclick="window.ExternalController.startMapping('zDown')" class="z-btn">▼</button>
                                        <div id="mapZDownValue" style="font-size: 8px; color: var(--text-general); margin-top: 2px;">Non mappé</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Onglet Fonctions -->
                    <div class="display-tab-content" id="functionsMappingTab">
                        <div class="setting-group">
                            <label>Recherche</label>
                            <input type="text" id="functionSearch" placeholder="Rechercher une fonction..." oninput="window.ExternalController.filterFunctions()" style="width: 100%; padding: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); border-radius: 4px;">
                        </div>
                        
                        <div class="setting-group">
                            <label>Catégories</label>
                            <div id="functionCategories">
                                <!-- Categories will be populated here -->
                            </div>
                        </div>
                    </div>
                    
                    <!-- Onglet Presets -->
                    <div class="display-tab-content" id="presetsMappingTab">
                        <div class="setting-group">
                            <label>Configurations Prédéfinies</label>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <div class="template-card" style="padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--container-bg);">
                                    <h4 style="margin: 0 0 8px 0; color: var(--text-selected);">🎹 MIDI Controller</h4>
                                    <p style="font-size: 11px; color: var(--text-general); margin: 0 0 8px 0;">Configuration pour Akai MPK Mini</p>
                                    <button onclick="window.ExternalController.loadMidiPreset()" class="validate-btn" style="width: 100%;">Appliquer</button>
                                </div>
                                <div class="template-card" style="padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--container-bg);">
                                    <h4 style="margin: 0 0 8px 0; color: var(--text-selected);">🎮 Gamepad</h4>
                                    <p style="font-size: 11px; color: var(--text-general); margin: 0 0 8px 0;">Configuration Xbox/PlayStation</p>
                                    <button onclick="window.ExternalController.loadGamepadPreset()" class="validate-btn" style="width: 100%;">Appliquer</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mappings actifs -->
                    <div class="setting-group" style="margin-top: 16px;">
                        <label>Mappings Actifs</label>
                        <div id="activeMappings" style="max-height: 100px; overflow-y: auto; border: 1px solid var(--border); border-radius: 4px; background: var(--input-bg); padding: 8px;">
                            <div style="font-size: 11px; color: var(--text-general); text-align: center;">Aucun mapping configuré</div>
                        </div>
                    </div>
                    
                    <div id="mappingStatus" style="margin-top: 12px; padding: 8px; border-radius: 4px; display: none; text-align: center; font-size: 11px;">
                        <span id="mappingStatusText"></span>
                    </div>
                </div>
                <div class="modal-actions">
                    <div class="config-actions">
                        <button onclick="window.ExternalController.saveMappingConfig()">Sauver config</button>
                        <button onclick="window.ExternalController.loadMappingConfig()">Charger config</button>
                        <button onclick="window.ExternalController.clearMappingConfig()">Reset</button>
                    </div>
                    <div class="modal-buttons">
                        <button onclick="window.ExternalController.closeMappingModal()" class="modal-btn cancel-btn">Fermer</button>
                    </div>
                </div>
            </div>
        </div>
