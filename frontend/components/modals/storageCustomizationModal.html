                        <!-- Modal Storage Customization -->
                        <div id="storageCustomizationModal" class="modal" style="display: none;">
                            <div class="modal-content" style="max-width: 600px;">
                                <div class="modal-header">
                                    <h3>⚙️ Local storage</h3>
                                    <button class="modal-close" onclick="closeStorageCustomization()">&times;</button>

                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
                                        <button onclick="window.EnderTrack.StorageManager.resetToNoStorage()" style="background: var(--active-element); color: var(--text-selected); border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px;">🚫 No storage</button>
                                        <button onclick="window.EnderTrack.StorageManager.resetToFullStorage()" style="background: var(--active-element); color: var(--text-selected); border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px;">✅ Full storage</button>
                                    </div>
                                    <div class="modal-buttons">
                                        <button onclick="closeStorageCustomization()" class="modal-btn cancel-btn">Annuler</button>
                                        <button onclick="applyStorageCustomization()" class="modal-btn apply-btn">Appliquer</button>
                                    </div>
                                </div>
                            </div>
